name: Build and Release

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version tag (e.g., v24.14.0)'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Node.js
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg NODE_VERSION=${{ inputs.node_version }} \
            --output type=local,dest=out \
            .

      - name: Create tarball
        run: |
          version="${{ inputs.node_version }}"
          version="${version#v}"  # Remove leading 'v'
          tar -czvf node-${version}-${{ matrix.arch }}.tar.gz -C out/usr/local .

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.arch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.sha256

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ inputs.node_version }}"
          gh release create "$version" \
            --title "Node.js $version" \
            --notes "Node.js $version with V8 pointer compression enabled.

          **Requires Alpine ≥3.22**

          ## Checksums
          \`\`\`
          $(cat artifacts/checksums.sha256)
          \`\`\`" \
            artifacts/*.tar.gz \
            artifacts/checksums.sha256
